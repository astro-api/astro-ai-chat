name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build macOS (universal PKG + DMG)
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: |
            dist/*.pkg
            dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            python3 \
            build-essential

      - name: Install dependencies
        run: npm install

      - name: Build Linux
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.AppImage
            dist/*.deb

  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AstroAI ${{ github.ref_name }}
          body: |
            ## AstroAI ${{ github.ref_name }}

            ### Installation

            | Platform | File |
            |---|---|
            | macOS (Intel + Apple Silicon) | `.pkg` — recommended, installs without extra steps |
            | macOS alternative | `.dmg` — drag & drop |
            | Windows | `.exe` (NSIS installer) |
            | Linux | `.AppImage`, `.deb` |

            **macOS:** Use the `.pkg` installer — no Terminal required.

            ### API Keys required
            Configure in Settings after launch. Get keys at:
            - [OpenRouter](https://openrouter.ai/keys) (recommended)
            - [Astrology API](https://dashboard.astrology-api.io)
          files: artifacts/**/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
